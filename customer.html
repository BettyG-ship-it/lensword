<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LensWord Customer Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #065A82 50%, #0F172A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 780px;
            display: flex;
            flex-direction: column;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
        }
        .header {
            background: linear-gradient(135deg, #065A82, #1C7293);
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%; right: -20px;
            width: 120px; height: 120px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .avatar {
            width: 46px; height: 46px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .header-info h2 { color: white; font-size: 1rem; font-weight: 700; }
        .header-info p { color: rgba(255,255,255,0.65); font-size: 0.75rem; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 7px; height: 7px; background: #10B981; border-radius: 50%; display: inline-block; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .ticket-chip { margin-left: auto; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; display: none; }
        .chat-area {
            flex: 1; background: #F8FAFC;
            overflow-y: auto; padding: 20px 16px;
            display: flex; flex-direction: column; gap: 14px;
            scroll-behavior: smooth;
        }
        .date-badge { text-align: center; font-size: 0.7rem; color: #94A3B8; background: #E2E8F0; padding: 3px 12px; border-radius: 20px; width: fit-content; margin: 0 auto; }
        .message { display: flex; gap: 8px; max-width: 88%; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .message.bot      { align-self: flex-start; }
        .message.customer { align-self: flex-end; flex-direction: row-reverse; }
        .message.agent    { align-self: flex-start; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 2px; }
        .message.bot .msg-avatar      { background: linear-gradient(135deg, #065A82, #1C7293); }
        .message.customer .msg-avatar { background: linear-gradient(135deg, #7C3AED, #9F67FA); }
        .message.agent .msg-avatar    { background: linear-gradient(135deg, #059669, #10B981); }
        .msg-content { display: flex; flex-direction: column; gap: 3px; }
        .message.customer .msg-content { align-items: flex-end; }
        .msg-bubble { padding: 11px 15px; border-radius: 18px; font-size: 0.88rem; line-height: 1.55; max-width: 100%; }
        .message.bot .msg-bubble      { background: white; color: #1E293B; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .message.customer .msg-bubble { background: linear-gradient(135deg, #065A82, #1C7293); color: white; border-bottom-right-radius: 4px; }
        .message.agent .msg-bubble    { background: #ECFDF5; color: #065F46; border-bottom-left-radius: 4px; border-left: 3px solid #10B981; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .msg-time { font-size: 0.65rem; color: #94A3B8; padding: 0 4px; }
        .typing { display: flex; gap: 8px; align-self: flex-start; animation: slideIn 0.3s ease; }
        .typing-bubble { background: white; padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px; display: flex; gap: 4px; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .dot { width: 7px; height: 7px; background: #94A3B8; border-radius: 50%; animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
        .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding-left: 40px; animation: slideIn 0.3s ease; }
        .qr-btn { background: white; border: 1.5px solid #1C7293; color: #1C7293; padding: 7px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: inherit; font-weight: 500; }
        .qr-btn:hover { background: #1C7293; color: white; transform: translateY(-1px); }
        .satisfaction-row { display: flex; gap: 6px; padding-left: 40px; animation: slideIn 0.3s ease; }
        .star-btn { background: none; border: 1.5px solid #E2E8F0; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .star-btn:hover { border-color: #FFC107; transform: scale(1.15); }
        .star-btn.selected { border-color: #FFC107; background: #FFF8E1; }
        .escalated-banner { background: #FFF3E0; border: 1px solid #FFB74D; border-radius: 12px; padding: 12px 16px; margin: 8px 0; font-size: 0.85rem; color: #E65100; text-align: center; animation: slideIn 0.3s ease; }
        .input-area { background: white; border-top: 1px solid #E2E8F0; padding: 14px 16px; }
        .review-section { display: flex; flex-direction: column; gap: 10px; }
        .review-label { font-size: 0.82rem; color: #64748B; font-weight: 500; }
        .review-input { width: 100%; border: 1.5px solid #E2E8F0; border-radius: 14px; padding: 12px 15px; font-size: 0.88rem; font-family: inherit; resize: none; min-height: 85px; color: #1E293B; outline: none; transition: border-color 0.2s, box-shadow 0.2s; line-height: 1.5; }
        .review-input:focus { border-color: #1C7293; box-shadow: 0 0 0 3px rgba(28,114,147,0.1); }
        .review-input::placeholder { color: #CBD5E1; }
        .input-footer { display: flex; align-items: center; justify-content: space-between; }
        .char-count { font-size: 0.72rem; color: #94A3B8; }
        .submit-btn { background: linear-gradient(135deg, #065A82, #1C7293); border: none; border-radius: 12px; color: white; padding: 11px 24px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; display: flex; align-items: center; gap: 6px; }
        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(6,90,130,0.35); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .voice-btn { background: none; border: 1.5px solid #E2E8F0; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
        .voice-btn:hover { border-color: #1C7293; }
        .voice-btn.recording { border-color: #FF6363; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
        .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
        .chat-text-input { flex: 1; border: 1.5px solid #E2E8F0; border-radius: 24px; padding: 10px 16px; font-size: 0.88rem; font-family: inherit; outline: none; color: #1E293B; resize: none; min-height: 44px; max-height: 110px; transition: border-color 0.2s; line-height: 1.4; }
        .chat-text-input:focus { border-color: #1C7293; }
        .chat-text-input::placeholder { color: #CBD5E1; }
        .send-btn { width: 44px; height: 44px; background: linear-gradient(135deg, #065A82, #1C7293); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .send-btn svg { width: 18px; height: 18px; fill: white; }
        .bottom-bar { display: flex; align-items: center; justify-content: center; padding-top: 8px; }
        .start-over-btn { background: none; border: none; color: #94A3B8; font-size: 0.75rem; cursor: pointer; font-family: inherit; transition: color 0.2s; padding: 4px 8px; }
        .start-over-btn:hover { color: #1C7293; }
        .powered-by { text-align: center; font-size: 0.68rem; color: #CBD5E1; padding-top: 4px; }
        .chat-area::-webkit-scrollbar { width: 3px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 2px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="avatar">🤖</div>
        <div class="header-info">
            <h2>LensWord Support</h2>
            <p><span class="online-dot"></span>Online and ready to help</p>
        </div>
        <div class="ticket-chip" id="ticketChip"></div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="date-badge" id="dateBadge"></div>
    </div>

    <div class="input-area">
        <div class="review-section" id="reviewSection">
            <div class="review-label">Tell us about your experience</div>
            <textarea class="review-input" id="reviewInput"
                placeholder="What did you think of your purchase? We would love to hear from you..."
                maxlength="2000"
                oninput="updateCharCount()"></textarea>
            <div class="input-footer">
                <div style="display:flex;gap:8px;align-items:center;">
                    <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Speak your review">🎤</button>
                    <span class="char-count" id="charCount">0 / 2000</span>
                </div>
                <button class="submit-btn" id="submitBtn" onclick="submitReview()">
                    Send Feedback
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>

        <div id="chatSection" style="display:none;flex-direction:column;">
            <div class="chat-input-row">
                <textarea class="chat-text-input" id="chatInput"
                    placeholder="Type a message..."
                    rows="1"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"></textarea>
                <button class="voice-btn" onclick="toggleVoice()" title="Voice input">🎤</button>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
                </button>
            </div>
            <div class="bottom-bar">
                <button class="start-over-btn" onclick="startOver()">↩ Start Over</button>
            </div>
        </div>

        <div class="powered-by">Powered by LensWord AI · LSTM + RAG + Groq + LangGraph</div>
    </div>
</div>

<script>
    const API_BASE = window.API_BASE || 'http://127.0.0.1:8000';
    const CONFIDENCE_THRESHOLD = 75.0;

    // Strong word overrides — client side safety net
    const strongNegativeWords = [
        'hate','hated','horrible','terrible','awful','worst','disgusting',
        'pathetic','useless','garbage','trash','scam','fraud','defective',
        'furious','outraged','unacceptable','dreadful','never again',
        'waste of money','rip off','ripped off'
    ];
    const strongPositiveWords = [
        'amazing','excellent','fantastic','outstanding','superb','brilliant',
        'perfect','wonderful','incredible','awesome','love this',
        'best purchase','highly recommend','five stars','exceeded expectations'
    ];

    function hasStrongNegative(text) { return strongNegativeWords.some(w => text.toLowerCase().includes(w)); }
    function hasStrongPositive(text) { return strongPositiveWords.some(w => text.toLowerCase().includes(w)); }

    let currentTicketId    = null;
    let currentStep        = null;
    let originalSentiment  = null;
    let originalReview     = null;
    let conversationState  = 'initial';
    let currentWs          = null;
    let recognition        = null;

    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, type) {
        const chat = document.getElementById('chatArea');
        const div  = document.createElement('div');
        div.className = `message ${type}`;
        const emojis = { bot: '🤖', customer: '👤', agent: '👩‍💼' };
        div.innerHTML = `
            <div class="msg-avatar">${emojis[type] || '👤'}</div>
            <div class="msg-content">
                <div class="msg-bubble">${text}</div>
                <div class="msg-time">${type === 'agent' ? 'Agent · ' : ''}${getTime()}</div>
            </div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;

        // Save to DB
        if (currentTicketId && type !== 'bot') {
            fetch(`${API_BASE}/message`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ticket_id: currentTicketId, sender: type, message: text })
            }).catch(() => {});
        }
    }

    function showTyping() {
        const chat = document.getElementById('chatArea');
        const div  = document.createElement('div');
        div.className = 'typing'; div.id = 'typingIndicator';
        div.innerHTML = `
            <div class="msg-avatar" style="background:linear-gradient(135deg,#065A82,#1C7293);">🤖</div>
            <div class="typing-bubble">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById('typingIndicator');
        if (t) t.remove();
    }

    function removeQuickReplies() {
        ['quickReplies','satisfactionRow'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.remove();
        });
    }

    function showQuickReplies(options) {
        if (!options || !options.length) return;
        removeQuickReplies();
        const chat = document.getElementById('chatArea');
        const div  = document.createElement('div');
        div.className = 'quick-replies'; div.id = 'quickReplies';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'qr-btn';
            btn.textContent = opt;
            btn.onclick = () => {
                removeQuickReplies();
                addMessage(opt, 'customer');
                continueConversation(opt);
            };
            div.appendChild(btn);
        });
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function showSatisfaction() {
        removeQuickReplies();
        const chat = document.getElementById('chatArea');
        addMessage("Before you go, how would you rate our support today? 😊", 'bot');
        const div = document.createElement('div');
        div.className = 'satisfaction-row'; div.id = 'satisfactionRow';
        [1,2,3,4,5].forEach(n => {
            const btn = document.createElement('button');
            btn.className = 'star-btn'; btn.textContent = '⭐';
            btn.onclick = async () => {
                document.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('selected', i < n));
                if (currentTicketId) {
                    await fetch(`${API_BASE}/satisfaction`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticket_id: currentTicketId, rating: n })
                    }).catch(() => {});
                }
                setTimeout(() => {
                    removeQuickReplies();
                    addMessage(`Thank you for the ${n} star rating! That really helps us improve. 🙏`, 'bot');
                    document.getElementById('chatInput').disabled = true;
                    document.getElementById('sendBtn').disabled   = true;
                    document.getElementById('chatInput').placeholder = 'Thank you for chatting with us!';
                }, 600);
            };
            div.appendChild(btn);
        });
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function showEscalatedBanner() {
        const chat = document.getElementById('chatArea');
        const div  = document.createElement('div');
        div.className = 'escalated-banner';
        div.innerHTML = '👩‍💼 You are now being connected with a live support agent. They will respond shortly.';
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // Process LangGraph messages from server
    function processLangMessages(messages, step, resolved, escalated, sentimentShift) {
        if (escalated) {
            showEscalatedBanner();
            conversationState = 'escalated';
            return;
        }

        if (sentimentShift) {
            console.log(`Sentiment shifted to: ${sentimentShift}`);
            originalSentiment = sentimentShift;
        }

        messages.forEach(msg => {
            setTimeout(() => addMessage(msg.message, 'bot'), 400);
        });

        currentStep = step;

        if (resolved) {
            conversationState = 'resolved';
            setTimeout(showSatisfaction, 1200);
        }

        // Show appropriate quick replies based on step
        const stepReplies = {
            'collect_order':      [],
            'offer_resolution':   ['Replacement please', 'Full refund', 'Store credit', 'Not sure yet'],
            'confirm_resolution': [],
            'closing_negative':   [],
            'collect_feedback':   ['Product quality', 'Delivery speed', 'Customer service', 'Pricing'],
            'closing_neutral':    [],
            'ask_review':         ['Yes I would love to!', 'Maybe later', 'No thanks'],
            'closing_positive':   [],
        };

        const replies = stepReplies[step];
        if (replies !== undefined && replies.length > 0) {
            setTimeout(() => showQuickReplies(replies), 600);
        }
    }

    async function continueConversation(customerMessage) {
        if (!currentTicketId || conversationState === 'resolved' || conversationState === 'escalated') return;

        showTyping();

        try {
            const res  = await fetch(`${API_BASE}/chat/continue`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    ticket_id:          currentTicketId,
                    message:            customerMessage,
                    current_step:       currentStep,
                    review_text:        originalReview,
                    original_sentiment: originalSentiment
                })
            });

            const data = await res.json();
            await new Promise(r => setTimeout(r, 800));
            removeTyping();

            processLangMessages(
                data.messages || [],
                data.step,
                data.resolved,
                data.escalated,
                data.sentiment_shift
            );

        } catch(e) {
            removeTyping();
            addMessage("Sorry, I had a bit of trouble processing that. Could you try again?", 'bot');
        }
    }

    async function submitReview() {
        const text = document.getElementById('reviewInput').value.trim();
        if (!text) return;

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = 'Analyzing...';

        addMessage(text, 'customer');
        document.getElementById('reviewSection').style.display = 'none';
        document.getElementById('chatSection').style.display   = 'flex';

        showTyping();

        // Client side strong word overrides
        let overrideSentiment = null;
        if (hasStrongNegative(text)) overrideSentiment = 'Negative';
        if (hasStrongPositive(text)) overrideSentiment = 'Positive';

        try {
            const res  = await fetch(`${API_BASE}/predict`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text,
                    override_sentiment: overrideSentiment || null
                })
            });
            const data = await res.json();

            await new Promise(r => setTimeout(r, 1200));
            removeTyping();

            // Save state
            currentTicketId   = data.ticket_id;
            originalReview    = text;
            originalSentiment = overrideSentiment || data.sentiment;
            currentStep       = data.current_step;
            conversationState = 'chatting';

            // Show ticket chip
            if (currentTicketId) {
                const chip = document.getElementById('ticketChip');
                chip.textContent = currentTicketId;
                chip.style.display = 'block';
                connectWebSocket(currentTicketId);
            }

            // Handle direct escalation request
            if (data.action === 'escalate_direct') {
                currentTicketId   = data.ticket_id;
                conversationState = 'escalated';
                const chip = document.getElementById('ticketChip');
                chip.textContent = data.ticket_id;
                chip.style.display = 'block';
                connectWebSocket(data.ticket_id);
                if (data.lang_messages && data.lang_messages.length) {
                    data.lang_messages.forEach(msg => addMessage(msg.message, 'bot'));
                }
                showEscalatedBanner();
                return;
            }

            if (!data.ticket_id || data.action === 'cannot_score') {
                addMessage("Thanks for reaching out! This chat helps with product and service feedback. Could you tell us about your purchase?", 'bot');
                setTimeout(() => showQuickReplies(["Something went wrong 😞", "It was just okay 😐", "I am happy with it 😊"]), 400);
                return;
            }

            if (data.confidence < CONFIDENCE_THRESHOLD && !overrideSentiment) {
                addMessage("Thanks for your message! Just so we can help you best, could you tell us how your experience went?", 'bot');
                setTimeout(() => showQuickReplies(["Something went wrong 😞", "It was just okay 😐", "I am happy with it 😊"]), 400);
                return;
            }

            // If strong word override — ignore LSTM sentiment and use override
            const effectiveSentiment = overrideSentiment || data.sentiment;

            // If override differs from LSTM — re-run conversation with correct sentiment
            if (overrideSentiment && overrideSentiment !== data.sentiment) {
                // Start correct flow locally based on override
                const overrideMessages = {
                    'Negative': "We are really sorry to hear that 😔 We want to make this right for you. Could you tell us a bit more about what went wrong?",
                    'Positive': "That is wonderful to hear! 😊🎉 We are so glad you had a great experience! What did you enjoy most about your purchase?",
                    'Neutral':  "Thank you for sharing your thoughts with us 😊 What do you think we could do better?"
                };
                originalSentiment = overrideSentiment;
                currentStep = overrideSentiment === 'Negative' ? 'collect_order'
                            : overrideSentiment === 'Neutral'  ? 'collect_feedback'
                            : 'ask_review';
                addMessage(overrideMessages[overrideSentiment], 'bot');
                if (overrideSentiment === 'Negative') {
                    setTimeout(() => showQuickReplies(["Product quality issue", "Shipping problem", "Wrong item received", "Something else"]), 600);
                }
                return;
            }

            // Process LangGraph messages normally
            processLangMessages(
                data.lang_messages || [],
                data.current_step,
                false,
                false,
                null
            );

        } catch(e) {
            removeTyping();
            addMessage("I am having a bit of trouble connecting. Please make sure the service is running and try again.", 'bot');
            document.getElementById('reviewSection').style.display = 'flex';
            document.getElementById('chatSection').style.display   = 'none';
            document.getElementById('submitBtn').disabled  = false;
            document.getElementById('submitBtn').textContent = 'Send Feedback';
        }
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const text  = input.value.trim();
        if (!text || conversationState === 'resolved') return;
        removeQuickReplies();
        addMessage(text, 'customer');
        input.value = '';
        input.style.height = 'auto';
        continueConversation(text);
    }

    function connectWebSocket(ticketId) {
        if (currentWs) currentWs.close();
        const wsUrl = API_BASE.replace('http', 'ws');
        currentWs = new WebSocket(`${wsUrl}/ws/${ticketId}`);
        currentWs.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.sender === 'agent') {
                addMessage(msg.message, 'agent');
            }
            if (msg.type === 'escalation') {
                showEscalatedBanner();
                conversationState = 'escalated';
            }
        };
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 110) + 'px';
    }

    function updateCharCount() {
        const len = document.getElementById('reviewInput').value.length;
        document.getElementById('charCount').textContent = `${len} / 2000`;
    }

    function toggleVoice() {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            alert('Voice input works in Chrome. Please use Chrome for this feature.');
            return;
        }
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!recognition) {
            recognition = new SR();
            recognition.lang = 'en-US';
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                const activeInput = conversationState === 'initial'
                    ? document.getElementById('reviewInput')
                    : document.getElementById('chatInput');
                activeInput.value = transcript;
                if (conversationState === 'initial') updateCharCount();
                document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('recording'));
            };
            recognition.onerror = () => {
                document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('recording'));
            };
        }
        document.querySelectorAll('.voice-btn').forEach(b => b.classList.add('recording'));
        recognition.start();
    }

    function startOver() {
        currentTicketId   = null;
        currentStep       = null;
        originalSentiment = null;
        originalReview    = null;
        conversationState = 'initial';
        if (currentWs) { currentWs.close(); currentWs = null; }

        const chat = document.getElementById('chatArea');
        chat.innerHTML = `<div class="date-badge" id="dateBadge"></div>`;
        setDateBadge();

        document.getElementById('reviewSection').style.display = 'flex';
        document.getElementById('chatSection').style.display   = 'none';
        document.getElementById('reviewInput').value = '';
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerHTML = 'Send Feedback <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>';
        document.getElementById('ticketChip').style.display = 'none';

        const ci = document.getElementById('chatInput');
        ci.disabled = false;
        ci.placeholder = 'Type a message...';
        document.getElementById('sendBtn').disabled = false;

        setTimeout(() => addMessage("Hello again! 👋 Take your time and share your experience whenever you are ready.", 'bot'), 400);
    }

    function setDateBadge() {
        const badge = document.getElementById('dateBadge');
        if (badge) {
            badge.textContent = new Date().toLocaleDateString('en-US', {
                weekday: 'long', month: 'long', day: 'numeric'
            });
        }
    }

    window.onload = () => {
        setDateBadge();
        setTimeout(() => addMessage("Hello! Welcome to LensWord Customer Support 👋 We are here to help. Please share your experience with our product below.", 'bot'), 500);
    };
</script>
</body>
</html>
